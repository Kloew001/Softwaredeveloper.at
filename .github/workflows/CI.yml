# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore SoftwaredeveloperDotAt.sln
      
    - name: Build
      run: dotnet build SoftwaredeveloperDotAt.sln --configuration Release --no-restore

    - name: Test Infrastructure.Core.Tests
      run: dotnet test Infrastructure.Core.Tests/Infrastructure.Core.Tests.csproj --configuration Release --no-build

    - name: Test SampleApp.Application.Tests
      run: dotnet test SampleApp/SampleApp.Application.Tests/SampleApp.Application.Tests.csproj --configuration Release --no-build

    - name: Dependency vulnerability audit
      run: dotnet list SoftwaredeveloperDotAt.sln package --vulnerable --include-transitive

      
